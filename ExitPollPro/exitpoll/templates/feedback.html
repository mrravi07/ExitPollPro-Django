<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RKS Data Labs - Feedback</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display.swap" rel="stylesheet">
    <style>
        body { font-family: 'Inter', sans-serif; background-color: #0f172a; color: #e2e8f0; }
        .app-grid { display: grid; grid-template-columns: 260px 1fr; min-height: 100vh; }
        .card { background-color: #1e293b; border-radius: 12px; padding: 24px; border: 1px solid #334155; }
        input, textarea { background-color: #334155; border-color: #475569; color: #e2e8f0; }
        @media (max-width: 1024px) { .app-grid { grid-template-columns: 1fr; } .sidebar { display: none; } }
    </style>
</head>
<body>

    <div class="app-grid">
        <!-- Sidebar -->
        <aside class="sidebar bg-slate-900 p-6 flex flex-col">
             <a href="{% url 'ml_dashboard' %}" class="flex items-center space-x-3 mb-8">
                <svg class="w-10 h-10 text-indigo-500" fill="none" viewBox="0 0 24 24" stroke-width="1.5" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" d="M3 13.125C3 12.504 3.504 12 4.125 12h2.25c.621 0 1.125.504 1.125 1.125v6.75C7.5 20.496 6.996 21 6.375 21h-2.25A1.125 1.125 0 013 19.875v-6.75zM9.75 8.625c0-.621.504-1.125 1.125-1.125h2.25c.621 0 1.125.504 1.125 1.125v11.25c0 .621-.504 1.125-1.125 1.125h-2.25a1.125 1.125 0 01-1.125-1.125V8.625zM16.5 4.125c0-.621.504-1.125 1.125-1.125h2.25C20.496 3 21 3.504 21 4.125v15.75c0 .621-.504 1.125-1.125 1.125h-2.25a1.125 1.125 0 01-1.125-1.125V4.125z" /></svg>
                <span class="text-2xl font-bold text-white">RKS Data Labs</span>
            </a>
        </aside>

        <!-- Main Content -->
        <main class="p-4 md:p-6 lg:p-8 overflow-y-auto">
            <header class="mb-6">
                <h1 class="text-4xl font-extrabold tracking-tight text-white">Submit Feedback</h1>
                <p class="text-slate-400 mt-2">We value your input. Let us know what you think!</p>
            </header>

            <nav class="mb-8 flex space-x-6 border-b border-slate-700">
                <a href="{% url 'ml_dashboard' %}" class="py-2 px-1 border-b-2 border-transparent text-slate-400 hover:text-white hover:border-slate-400 transition-colors">Home</a>
                <a href="{% url 'report_page' %}" class="py-2 px-1 border-b-2 border-transparent text-slate-400 hover:text-white hover:border-slate-400 transition-colors">Report</a>
                <a href="{% url 'feedback_page' %}" class="py-2 px-1 border-b-2 border-indigo-500 text-white font-semibold">Feedback</a>
            </nav>

            <div class="card max-w-2xl mx-auto">
                {% if success %}
                    <div class="text-center">
                        <h2 class="text-2xl font-bold text-emerald-400 mb-2">Thank You!</h2>
                        <p class="text-slate-300">Your feedback has been submitted successfully.</p>
                        <a href="{% url 'ml_dashboard' %}" class="mt-6 inline-block px-6 py-2 bg-indigo-600 text-white font-semibold rounded-lg hover:bg-indigo-700 transition-colors">Back to Home</a>
                    </div>
                {% else %}
                    <form action="{% url 'feedback_page' %}" method="POST">
                        {% csrf_token %}
                        <div class="space-y-6">
                            <div>
                                <label for="name" class="block text-sm font-medium text-slate-300">Your Name</label>
                                <input type="text" id="name" name="name" class="mt-1 block w-full p-2 border rounded-lg focus:ring-2 focus:ring-indigo-500 transition" placeholder="Ravi Kumar Singh" required>
                            </div>
                            <div>
                                <label for="email" class="block text-sm font-medium text-slate-300">Email Address</label>
                                <input type="email" id="email" name="email" class="mt-1 block w-full p-2 border rounded-lg focus:ring-2 focus:ring-indigo-500 transition" placeholder="you@example.com" required>
                            </div>
                            <div>
                                <label for="message" class="block text-sm font-medium text-slate-300">Message</label>
                                <textarea id="message" name="message" rows="5" class="mt-1 block w-full p-2 border rounded-lg focus:ring-2 focus:ring-indigo-500 transition" placeholder="Your feedback..." required></textarea>
                            </div>
                            <div class="text-right">
                                <button type="submit" class="px-6 py-2 bg-indigo-600 text-white font-semibold rounded-lg hover:bg-indigo-700 transition-transform transform hover:scale-105 shadow-md">Submit Feedback</button>
                            </div>
                        </div>
                    </form>
                {% endif %}
            </div>
        </main>
    </div>
</body>
</html>
